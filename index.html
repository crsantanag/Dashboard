	<section>
		<h1>Indicadores económicos</h1>
		</br>

		<div class="card-container">

			<div class="card">
				<img class="card-image" src="assets/img/imacec.jpg" alt="Imagen Imacec">
				<p id="imacec" class="title-info-article"></p>
				<button class="button" id="botonImacec" type="submit">Graficar Serie</button>
			</div>

			<div class="card">
				<img class="card-image" src="assets/img/tpm.jpg" alt="Imagen TPC">
				<p id="tpm" class="title-info-article"> </p>
				<button class="button" id="botonTpm" type="submit">Graficar Serie</button>
			</div>

			<div class="card">
				<img class="card-image" src="assets/img/uf.jpg" alt="Imagen UF">
				<p id="uf" class="title-info-article"> </p>
				<button class="button" id="botonUf" type="submit">Graficar Serie</button>
			</div>

			<div class="card">
				<img class="card-image" src="assets/img/ipc.jpg" alt="Imagen IPC">
				<p id="ipc" class="title-info-article"> </p>
				<button class="button" id="botonIpc" type="submit">Graficar Serie</button>
			</div>

			<div class="card">
				<img class="card-image" src="assets/img/dolar.jpg" alt="Imagen DOLAR">
				<p id="dolar" class="title-info-article"> </p>
				<button class="button" id="botonDolar" type="submit">Graficar Serie</button>
			</div>

			<div class="card">
				<img class="card-image" src="assets/img/euro.jpg" alt="Imagen EURO">
				<p id="euro" class="title-info-article"> </p>
				<button class="button" id="botonEuro" type="submit">Graficar Serie</button>
			</div>

		</div>
		<br>
		<canvas class ="grafico" id="grafico"></canvas>
	</section>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="assets/js/app.js"></script>
